<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAA Karma Food Lt. - Bill Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background-color: white !important; padding: 0 !important; }
            .invoice-card { box-shadow: none !important; border: 1px solid #e5e7eb !important; width: 100% !important; margin: 0 !important; }
        }
        input::placeholder { color: #9ca3af; opacity: 0.5; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .loading-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-gray-100 py-10 px-4 min-h-screen font-sans text-gray-800">

    <div class="max-w-4xl mx-auto">
        <div class="flex justify-end gap-4 mb-6 no-print">
            <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-semibold flex items-center gap-2 transition-colors">
                Print Invoice
            </button>
            <button onclick="resetInvoice()" class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 px-6 py-2 rounded-lg font-semibold transition-colors">
                Reset
            </button>
        </div>

        <div id="invoiceContent" class="invoice-card bg-white shadow-xl rounded-xl p-8 md:p-12 border border-gray-200">
            <!-- Header -->
            <div class="flex flex-col md:flex-row justify-between mb-12 gap-8">
                <div>
                    <h1 class="text-4xl font-bold text-gray-800 tracking-tight uppercase">Invoice</h1>
                    <div class="mt-4 text-gray-600">
                        <p class="font-bold text-gray-800 text-xl">MAA Karma Food Lt.</p>
                        <p>Pounar, Amarwara (480221)</p>
                        <p>Contact: +91 62675 67726</p>
                    </div>
                </div>
                <div class="text-left md:text-right">
                    <div class="mb-2">
                        <label class="block text-xs font-bold text-gray-500 uppercase">Invoice No</label>
                        <input type="text" id="invoiceId" readonly class="text-gray-800 font-medium text-lg outline-none border-b border-transparent bg-transparent">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase">Date & Time</label>
                        <input type="datetime-local" id="currentDate" class="text-gray-800 font-medium outline-none border-b border-transparent focus:border-blue-400">
                    </div>
                </div>
            </div>

            <!-- Customer Details -->
            <div class="mb-12">
                <h2 class="text-sm font-bold text-blue-600 uppercase tracking-widest mb-4">Customer Information</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs text-gray-400 font-semibold mb-1">Phone Number</label>
                            <input type="text" id="custPhone" placeholder="10 Digit Phone" oninput="handlePhoneInput(this)" class="w-full text-gray-800 font-medium border-b border-gray-200 focus:border-blue-500 py-1 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 font-semibold mb-1">Customer Name</label>
                            <input type="text" id="custName" placeholder="Enter Name" class="w-full text-gray-800 font-medium border-b border-gray-200 focus:border-blue-500 py-1 outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 font-semibold mb-1">Shipping Address</label>
                        <textarea id="custAddress" placeholder="Full Address" rows="3" class="w-full text-gray-800 font-medium border border-gray-100 rounded p-2 focus:border-blue-500 outline-none resize-none"></textarea>
                    </div>
                </div>
            </div>

            <!-- Table -->
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="border-b-2 border-gray-800">
                            <th class="py-4 text-xs font-bold text-gray-600 uppercase w-12">#</th>
                            <th class="py-4 text-xs font-bold text-gray-600 uppercase">Description</th>
                            <th class="py-4 text-xs font-bold text-gray-600 uppercase w-20 text-center">Qty</th>
                            <th class="py-4 text-xs font-bold text-gray-600 uppercase w-24 text-center">Rate</th>
                            <th class="py-4 text-xs font-bold text-gray-600 uppercase w-28 text-right">Amount</th>
                            <th class="py-4 w-10 no-print"></th>
                        </tr>
                    </thead>
                    <tbody id="invoiceItems">
                        <tr class="item-row border-b border-gray-100 group">
                            <td class="py-4 text-gray-400 font-medium">1</td>
                            <td class="py-4"><input type="text" class="desc w-full outline-none font-medium" placeholder="Item Name"></td>
                            <td class="py-4"><input type="number" value="0" onfocus="handleNumberFocus(this)" onblur="handleNumberBlur(this)" oninput="calculateRow(this)" class="qty w-full text-center outline-none font-medium"></td>
                            <td class="py-4"><input type="number" value="0" onfocus="handleNumberFocus(this)" onblur="handleNumberBlur(this)" oninput="calculateRow(this)" class="rate w-full text-center outline-none font-medium"></td>
                            <td class="py-4 text-right font-bold text-gray-800 amount">0</td>
                            <td class="py-4 text-center no-print">
                                <button onclick="deleteRow(this)" class="text-red-300 hover:text-red-500 opacity-0 group-hover:opacity-100 text-xl">×</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <button onclick="addRow()" class="mt-4 text-blue-600 font-bold text-sm no-print">+ ADD ITEM</button>
            </div>

            <!-- Totals & Payment -->
            <div class="mt-12 flex flex-col md:flex-row justify-between items-start border-t-2 border-gray-100 pt-8 gap-8">
                <div id="qrCodeContainer" class="hidden">
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-2 tracking-widest text-center">Scan to Pay</p>
                    <div class="p-2 border rounded bg-white shadow-sm">
                        <img src="https://drive.google.com/uc?export=view&id=1cawZlS03dWUFEDhYJvlpZGxob6jGB1SA" class="w-32 h-32" alt="Payment QR">
                    </div>
                </div>

                <div class="w-full md:w-80 space-y-3">
                    <div class="flex justify-between text-gray-600">
                        <span>Current Subtotal</span>
                        <span id="subtotal" class="font-bold">0</span>
                    </div>
                    
                    <div class="flex justify-between items-center text-red-600">
                        <span>Pending Amount</span>
                        <input type="number" id="dueAmount" value="" placeholder="0" class="w-20 text-right font-bold outline-none border-b border-gray-200 bg-transparent">
                    </div>
                    
                    <div class="bg-gray-900 text-white p-4 rounded-lg flex justify-between items-center shadow-lg">
                        <span class="text-xs font-bold uppercase tracking-wider">Total Payable</span>
                        <span id="grandTotal" class="text-xl font-black">0</span>
                    </div>

                    <div class="pt-4 no-print">
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Payment Mode</label>
                        <select id="paymentMethod" onchange="togglePaymentDetails()" class="w-full p-2 border rounded-lg font-bold bg-gray-50 outline-none cursor-pointer">
                            <option value="Cash">Cash</option>
                            <option value="UPI">UPI</option>
                            <option value="Both">Both (Cash + UPI)</option>
                        </select>
                        
                        <div id="splitDetails" class="hidden mt-4 p-3 bg-blue-50 rounded-lg space-y-2 border border-blue-100">
                            <div class="flex justify-between items-center text-xs font-bold">
                                <span>CASH PAID:</span>
                                <input type="number" id="cashInput" value="0" onfocus="handleNumberFocus(this)" onblur="handleNumberBlur(this)" oninput="syncPayments('cash')" class="w-20 text-right bg-transparent border-b border-blue-200 outline-none">
                            </div>
                            <div class="flex justify-between items-center text-xs font-bold">
                                <span>UPI PAID:</span>
                                <input type="number" id="upiInput" value="0" onfocus="handleNumberFocus(this)" onblur="handleNumberBlur(this)" oninput="syncPayments('upi')" class="w-20 text-right bg-transparent border-b border-blue-200 outline-none">
                            </div>
                        </div>

                        <div class="flex gap-2 mt-6">
                            <button onclick="saveInvoice()" id="saveBtn" class="flex-1 bg-green-600 hover:bg-green-700 text-white py-2 rounded-lg font-bold transition-all flex items-center justify-center gap-2 shadow-sm">
                                SAVE
                            </button>
                            <button onclick="shareInvoice()" class="flex-1 bg-gray-800 hover:bg-black text-white py-2 rounded-lg font-bold transition-all flex items-center justify-center gap-2 shadow-sm">
                                SHARE
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full text-sm font-bold opacity-0 transition-all pointer-events-none no-print z-50 shadow-2xl"></div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyc1KKT7sA-VJsKWaYMSn9ddpwuZWmayigtG3su0CGp-hxEtauUn8atYqRXVbKd5aKgqw/exec';

        window.onload = () => { 
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('currentDate').value = `${year}-${month}-${day}T${hours}:${minutes}`; 
            
            fetchInvoiceNo();
        };

        async function fetchInvoiceNo() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                if (data.invoiceNo) {
                    document.getElementById('invoiceId').value = `#IN-${data.invoiceNo}`;
                }
            } catch (e) { console.error("Failed to fetch initial row ID", e); }
        }

        function handleNumberFocus(input) {
            if (input.value === "0") input.value = "";
        }

        function handleNumberBlur(input) {
            if (input.value === "") input.value = "0";
        }

        async function handlePhoneInput(input) {
            const phone = input.value.replace(/\D/g, '');
            if (phone.length === 10) {
                const nameF = document.getElementById('custName');
                const addrF = document.getElementById('custAddress');
                const invF = document.getElementById('invoiceId');
                
                nameF.classList.add('loading-pulse');
                addrF.classList.add('loading-pulse');
                
                try {
                    const res = await fetch(`${SCRIPT_URL}?phone=${phone}`);
                    const data = await res.json();
                    if (data.status === 'success') {
                        nameF.value = data.name || '';
                        addrF.value = data.address || '';
                        invF.value = `#IN-${data.invoiceNo}`;
                        showToast("Previous records loaded!");
                        calculateTotals();
                    }
                } catch (e) { 
                    console.error(e); 
                    showToast("Error fetching records.");
                }
                finally { 
                    nameF.classList.remove('loading-pulse'); 
                    addrF.classList.remove('loading-pulse'); 
                }
            }
        }

        function togglePaymentDetails() {
            const method = document.getElementById('paymentMethod').value;
            const splitDetails = document.getElementById('splitDetails');
            const total = parseInt(document.getElementById('grandTotal').innerText) || 0;

            splitDetails.classList.toggle('hidden', method !== 'Both');
            document.getElementById('qrCodeContainer').classList.toggle('hidden', method === 'Cash');

            if (method === 'Both') {
                document.getElementById('cashInput').value = total;
                document.getElementById('upiInput').value = 0;
            }
        }

        function syncPayments(source) {
            const total = parseInt(document.getElementById('grandTotal').innerText) || 0;
            const cashInput = document.getElementById('cashInput');
            const upiInput = document.getElementById('upiInput');

            if (source === 'cash') {
                const cashVal = parseInt(cashInput.value) || 0;
                upiInput.value = Math.max(0, total - cashVal);
            } else {
                const upiVal = parseInt(upiInput.value) || 0;
                cashInput.value = Math.max(0, total - upiVal);
            }
        }

        function calculateRow(input) {
            const row = input.closest('tr');
            const qty = parseFloat(row.querySelector('.qty').value) || 0;
            const rate = parseFloat(row.querySelector('.rate').value) || 0;
            row.querySelector('.amount').innerText = Math.round(qty * rate);
            calculateTotals();
        }

        function calculateTotals() {
            let sub = 0;
            document.querySelectorAll('.amount').forEach(a => sub += parseInt(a.innerText) || 0);
            document.getElementById('subtotal').innerText = sub;
            document.getElementById('grandTotal').innerText = sub;
            if (document.getElementById('paymentMethod').value === 'Both') syncPayments('cash');
        }

        async function saveInvoice() {
            const btn = document.getElementById('saveBtn');
            const originalText = btn.innerText;
            btn.innerText = "SAVING...";
            btn.disabled = true;

            const rows = document.querySelectorAll('.item-row');
            const paymentMethod = document.getElementById('paymentMethod').value;
            const grandTotal = parseInt(document.getElementById('grandTotal').innerText);

            let cashVal = 0, upiVal = 0;
            if (paymentMethod === 'Cash') cashVal = grandTotal;
            else if (paymentMethod === 'UPI') upiVal = grandTotal;
            else {
                cashVal = parseInt(document.getElementById('cashInput').value) || 0;
                upiVal = parseInt(document.getElementById('upiInput').value) || 0;
            }

            const data = {
                date: document.getElementById('currentDate').value.replace('T', ' '),
                phone: document.getElementById('custPhone').value,
                name: document.getElementById('custName').value,
                address: document.getElementById('custAddress').value,
                descriptions: Array.from(rows).map(r => r.querySelector('.desc').value).join('\n'),
                qtys: Array.from(rows).map(r => r.querySelector('.qty').value).join('\n'),
                rates: Array.from(rows).map(r => r.querySelector('.rate').value).join('\n'),
                amounts: Array.from(rows).map(r => r.querySelector('.amount').innerText).join('\n'),
                grandTotal: grandTotal,
                paymentMode: paymentMethod,
                upiPaid: upiVal,
                cashPaid: cashVal,
                pendingAmount: document.getElementById('dueAmount').value || 0
            };

            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                showToast("Invoice Data Sent!");
                setTimeout(() => { if(confirm("Clear bill for next customer?")) window.location.reload(); }, 1500);
            } catch (e) { 
                showToast("Network Error."); 
                console.error(e);
            } finally { btn.innerText = originalText; btn.disabled = false; }
        }

        function addRow() {
            const tbody = document.getElementById('invoiceItems');
            const rowCount = tbody.rows.length + 1;
            const newRow = document.createElement('tr');
            newRow.className = "item-row border-b border-gray-100 group";
            newRow.innerHTML = `
                <td class="py-4 text-gray-400 font-medium">${rowCount}</td>
                <td class="py-4"><input type="text" class="desc w-full outline-none font-medium" placeholder="Item Name"></td>
                <td class="py-4"><input type="number" value="0" onfocus="handleNumberFocus(this)" onblur="handleNumberBlur(this)" oninput="calculateRow(this)" class="qty w-full text-center outline-none font-medium"></td>
                <td class="py-4"><input type="number" value="0" onfocus="handleNumberFocus(this)" onblur="handleNumberBlur(this)" oninput="calculateRow(this)" class="rate w-full text-center outline-none font-medium"></td>
                <td class="py-4 text-right font-bold text-gray-800 amount">0</td>
                <td class="py-4 text-center no-print">
                    <button onclick="deleteRow(this)" class="text-red-300 hover:text-red-500 opacity-0 group-hover:opacity-100 text-xl">×</button>
                </td>
            `;
            tbody.appendChild(newRow);
        }

        function deleteRow(btn) {
            if(document.querySelectorAll('.item-row').length > 1) {
                btn.closest('tr').remove();
                document.querySelectorAll('.item-row').forEach((r, i) => r.cells[0].innerText = i + 1);
                calculateTotals();
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 3000);
        }

        function shareInvoice() {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value.replace(/\D/g, '');
            const invId = document.getElementById('invoiceId').value;
            const date = document.getElementById('currentDate').value.replace('T', ' ');
            const subtotal = document.getElementById('subtotal').innerText;
            const pendingVal = parseFloat(document.getElementById('dueAmount').value) || 0;
            const total = document.getElementById('grandTotal').innerText;

            let itemsText = "";
            document.querySelectorAll('.item-row').forEach(row => {
                const desc = row.querySelector('.desc').value || "Item";
                const qty = row.querySelector('.qty').value;
                const rate = row.querySelector('.rate').value;
                const amt = row.querySelector('.amount').innerText;
                if(amt > 0) itemsText += `• ${desc} (${qty} x ${rate}) = ₹${amt}\n`;
            });

            // Conditional Pending line
            let pendingLine = pendingVal > 0 ? `*Pending:* ₹${pendingVal}\n` : "";

            const message = `*MAA Karma Food Lt. - BILL*\n` +
                          `--------------------------\n` +
                          `*Invoice:* ${invId}\n` +
                          `*Date:* ${date}\n` +
                          `--------------------------\n` +
                          `*Customer:* ${name || 'Valued Guest'}\n` +
                          `--------------------------\n` +
                          `*Items:*\n${itemsText}` +
                          `--------------------------\n` +
                          `*Subtotal:* ₹${subtotal}\n` +
                          pendingLine +
                          `*Total Payable: ₹${total}*\n` +
                          `--------------------------\n` +
                          `Thank you for your business!`;

            const encodedMsg = encodeURIComponent(message);
            const waUrl = `https://wa.me/${phone}?text=${encodedMsg}`;
            
            if(phone.length >= 10) {
                window.open(waUrl, '_blank');
            } else {
                showToast("Enter a valid phone number to share via WhatsApp!");
                const tempInput = document.createElement('textarea');
                tempInput.value = message;
                document.body.appendChild(tempInput);
                tempInput.select();
                document.execCommand('copy');
                document.body.removeChild(tempInput);
            }
        }

        function resetInvoice() { if(confirm("Are you sure you want to clear this bill?")) window.location.reload(); }
    </script>
</body>
</html>
